name: Deploy Laravel via SFTP

on:
  push:
    branches:
      - production

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "${{ secrets.SFTP_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync files via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          lftp -u "$SFTP_USER," "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set cmd:fail-exit yes
          set sftp:connect-program "ssh -a -x -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          mirror --reverse --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob .env \
            --exclude-glob vendor/ \
            --exclude-glob node_modules/ \
            --exclude-glob storage/logs/ \
            --exclude-glob storage/framework/cache/ \
            --exclude-glob storage/framework/sessions/ \
            --exclude-glob storage/framework/views/ \
            --exclude-glob storage/app/public/ \
            ./ "$SFTP_REMOTE_DIR"

          bye
          EOF

      - name: Run Laravel post-deploy commands
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SFTP_PORT" \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            "$SFTP_USER@$SFTP_HOST" <<EOF
          set -e

          cd "$SFTP_REMOTE_DIR"

          if [ ! -f .env ]; then
            echo "ERROR: No existe .env en el servidor."
            echo "Crealo manualmente en $SFTP_REMOTE_DIR/.env antes de deployar."
            exit 1
          fi

          mkdir -p resources/views
          touch resources/views/.gitkeep

          composer install --no-dev --optimize-autoloader
          php8.5 artisan optimize:clear
          php8.5 artisan storage:link || true
          php8.5 artisan optimize

          chmod -R ug+rwX storage bootstrap/cache

          echo "Deploy Laravel finalizado correctamente."
          EOF
