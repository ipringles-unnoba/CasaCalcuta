name: Deploy via SFTP

on:
  push:
    branches:
      - production

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "${{ secrets.SFTP_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync files via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          lftp -u "$SFTP_USER," "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set cmd:fail-exit yes
          set sftp:connect-program "ssh -a -x -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          mirror --reverse --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob .env \
            ./ "$SFTP_REMOTE_DIR"

          bye
          EOF
